name: .NET Release

on:
  workflow_run:
    workflows: ["Release Rust Crate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate package without publishing"
        required: false
        default: true
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'
  RUST_TOOLCHAIN: stable
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: dotnet-release-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native (${{ matrix.rid }})
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: native-win-x64
            cargo-target: x86_64-pc-windows-msvc
            native-lib: timslite_dotnet.dll
            rustflags: ""
          - os: windows-11-arm
            rid: win-arm64
            artifact: native-win-arm64
            cargo-target: aarch64-pc-windows-msvc
            native-lib: timslite_dotnet.dll
            rustflags: ""
          - os: ubuntu-latest
            rid: linux-x64
            artifact: native-linux-x64
            cargo-target: x86_64-unknown-linux-gnu
            native-lib: libtimslite_dotnet.so
            rustflags: ""
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: native-linux-arm64
            cargo-target: aarch64-unknown-linux-gnu
            native-lib: libtimslite_dotnet.so
            rustflags: ""
          - os: ubuntu-latest
            rid: linux-musl-x64
            artifact: native-linux-musl-x64
            cargo-target: x86_64-unknown-linux-musl
            native-lib: libtimslite_dotnet.so
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN'
          - os: ubuntu-24.04-arm
            rid: linux-musl-arm64
            artifact: native-linux-musl-arm64
            cargo-target: aarch64-unknown-linux-musl
            native-lib: libtimslite_dotnet.so
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN'
          - os: macos-14
            rid: osx-arm64
            artifact: native-osx-arm64
            cargo-target: aarch64-apple-darwin
            native-lib: libtimslite_dotnet.dylib
            rustflags: ""
    runs-on: ${{ matrix.os }}
    env:
      CARGO_PROFILE_RELEASE_PANIC: abort
      CARGO_TARGET_DIR: wrapper/dotnet/native/target
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo-target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/dotnet/native/target
          key: ${{ runner.os }}-${{ matrix.rid }}-cargo-dotnet-${{ hashFiles('wrapper/dotnet/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rid }}-cargo-dotnet-
            ${{ runner.os }}-cargo-dotnet-

      - name: Build native library
        if: ${{ !startsWith(matrix.rid, 'linux-') }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --manifest-path wrapper/dotnet/native/Cargo.toml --release --target ${{ matrix.cargo-target }} --lib

      - name: Build native library (manylinux)
        if: ${{ startsWith(matrix.rid, 'linux-') && !startsWith(matrix.rid, 'linux-musl-') }}
        shell: bash
        env:
          GNU_TARGET: ${{ matrix.cargo-target }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -euo pipefail
          case "${GNU_TARGET}" in
            x86_64-unknown-linux-gnu)
              image="quay.io/pypa/manylinux_2_28_x86_64"
              ;;
            aarch64-unknown-linux-gnu)
              image="quay.io/pypa/manylinux_2_28_aarch64"
              ;;
            *)
              echo "Unsupported manylinux target: ${GNU_TARGET}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -e CARGO_PROFILE_RELEASE_PANIC=abort \
            -e CARGO_TARGET_DIR=/work/wrapper/dotnet/native/target \
            -e GNU_TARGET \
            -e RUSTFLAGS \
            -v "${PWD}:/work" \
            -w /work \
            "${image}" \
            /bin/bash -lc '
            set -euo pipefail
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y curl
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl
            fi
            if ! command -v cargo >/dev/null 2>&1; then
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${HOME}/.cargo/env"
            fi
            if command -v rustup >/dev/null 2>&1; then
              rustup target add "${GNU_TARGET}"
            fi
            cargo build --manifest-path wrapper/dotnet/native/Cargo.toml --release --target "${GNU_TARGET}" --lib
            '

      - name: Build native library (musl)
        if: ${{ startsWith(matrix.rid, 'linux-musl-') }}
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          MUSL_TARGET: ${{ matrix.cargo-target }}
        run: |
          set -euo pipefail
          case "${MUSL_TARGET}" in
            x86_64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_x86_64"
              ;;
            aarch64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_aarch64"
              ;;
            *)
              echo "Unsupported musl target: ${MUSL_TARGET}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -e CARGO_PROFILE_RELEASE_PANIC=abort \
            -e CARGO_TARGET_DIR=/work/wrapper/dotnet/native/target \
            -e MUSL_TARGET \
            -e RUSTFLAGS \
            -v "${PWD}:/work" \
            -w /work \
            "${image}" \
            /bin/bash -lc '
            set -euo pipefail
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache curl
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y curl
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl
            fi
            if ! command -v cargo >/dev/null 2>&1; then
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${HOME}/.cargo/env"
            fi
            if command -v rustup >/dev/null 2>&1; then
              rustup target add "${MUSL_TARGET}"
            fi
            case "${MUSL_TARGET}" in
              x86_64-unknown-linux-musl)
                linker_env="CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="x86_64-linux-musl-gcc x86_64-unknown-linux-musl-gcc musl-gcc gcc"
                ;;
              aarch64-unknown-linux-musl)
                linker_env="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="aarch64-linux-musl-gcc aarch64-unknown-linux-musl-gcc gcc"
                ;;
            esac
            linker=""
            for candidate in ${candidates}; do
              if command -v "${candidate}" >/dev/null 2>&1; then
                linker="$(command -v "${candidate}")"
                break
              fi
            done
            if [ -z "${linker}" ]; then
              linker="$(find / -type f \( -name "${MUSL_TARGET}-gcc" -o -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${linker}" ] || [ ! -x "${linker}" ]; then
              echo "Could not find musl linker for ${MUSL_TARGET}" >&2
              find / -maxdepth 4 -type f \( -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) -print >&2 2>/dev/null || true
              exit 1
            fi
            export "${linker_env}=${linker}"
            cargo build --manifest-path wrapper/dotnet/native/Cargo.toml --release --target "${MUSL_TARGET}" --lib
            libgcc_path="$("${linker}" -print-file-name=libgcc_s.so.1 || true)"
            if [ -z "${libgcc_path}" ] || [ "${libgcc_path}" = "libgcc_s.so.1" ] || [ ! -f "${libgcc_path}" ]; then
              libgcc_path="$(find / -type f -name libgcc_s.so.1 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${libgcc_path}" ] || [ ! -f "${libgcc_path}" ]; then
              echo "Could not find musl libgcc_s.so.1" >&2
              "${linker}" -print-search-dirs >&2 || true
              find / -maxdepth 5 -type f -name libgcc_s.so.1 -print >&2 2>/dev/null || true
              exit 1
            fi
            cp "${libgcc_path}" "wrapper/dotnet/native/target/${MUSL_TARGET}/release/libgcc_s.so.1"
            '

      - name: Prepare native artifact
        shell: bash
        run: |
          set -euo pipefail
          release_dir="wrapper/dotnet/native/target/${{ matrix.cargo-target }}/release"
          dest="native-upload/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          if [ ! -d "${release_dir}" ]; then
            echo "Cargo release directory does not exist: ${release_dir}" >&2
            find wrapper/dotnet/native/target -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi
          lib_path="$(find "${release_dir}" -maxdepth 2 -type f -name "${{ matrix.native-lib }}" | head -n 1)"
          if [ -z "${lib_path}" ]; then
            echo "Could not find ${{ matrix.native-lib }} under ${release_dir}" >&2
            find "${release_dir}" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          cp "${lib_path}" "$dest/${{ matrix.native-lib }}"
          if [ -f "${release_dir}/libgcc_s.so.1" ]; then
            cp "${release_dir}/libgcc_s.so.1" "$dest/libgcc_s.so.1"
          fi
          find native-upload -type f -print

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-upload/

  validate:
    name: Validate NuGet package
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          runtimes_dir="wrapper/dotnet/src/Timslite/runtimes"
          rm -rf "$runtimes_dir"
          cp -R native-download/runtimes "$runtimes_dir"
          echo "=== Staged native libraries ==="
          find "$runtimes_dir" -type f -print

      - name: Verify version alignment
        shell: bash
        run: |
          set -euo pipefail
          root_version=$(grep -m1 'version' Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          native_version=$(grep -m1 'version' wrapper/dotnet/native/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          csproj_version=$(grep -oP '<Version>\K[^<]+' wrapper/dotnet/src/Timslite/Timslite.csproj)

          echo "Root crate:    $root_version"
          echo "Native crate:  $native_version"
          echo "Csproj:        $csproj_version"

          if [[ "$root_version" != "$native_version" ]]; then
            echo "ERROR: Version mismatch between root and native crate" >&2
            exit 1
          fi
          if [[ "$csproj_version" != "$root_version" ]]; then
            echo "ERROR: Version mismatch between root crate and csproj" >&2
            exit 1
          fi
          echo "All versions aligned: $root_version"

      - name: Pack NuGet package
        run: dotnet pack wrapper/dotnet/src/Timslite/Timslite.csproj -c Release

      - name: Inspect package content
        shell: bash
        run: |
          set -euo pipefail
          nupkg=$(find wrapper/dotnet/src/Timslite/bin/Release -name 'Timslite.*.nupkg' | head -1)
          if [[ -z "$nupkg" ]]; then
            echo "ERROR: .nupkg not found" >&2
            exit 1
          fi
          echo "Package: $nupkg"
          ls -lh "$nupkg"
          echo ""
          echo "=== Package contents ==="
          unzip -l "$nupkg"
          echo ""
          echo "=== Verifying native libraries ==="
          for lib in \
            runtimes/win-x64/native/timslite_dotnet.dll \
            runtimes/win-arm64/native/timslite_dotnet.dll \
            runtimes/linux-x64/native/libtimslite_dotnet.so \
            runtimes/linux-arm64/native/libtimslite_dotnet.so \
            runtimes/linux-musl-x64/native/libtimslite_dotnet.so \
            runtimes/linux-musl-x64/native/libgcc_s.so.1 \
            runtimes/linux-musl-arm64/native/libtimslite_dotnet.so \
            runtimes/linux-musl-arm64/native/libgcc_s.so.1 \
            runtimes/osx-arm64/native/libtimslite_dotnet.dylib; do
            if ! unzip -l "$nupkg" | grep -q "$lib"; then
              echo "ERROR: Missing $lib in package" >&2
              exit 1
            fi
            echo "  OK: $lib"
          done
          echo "All native libraries present."

      - name: Test consumer project
        shell: bash
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          nupkg_dir="wrapper/dotnet/src/Timslite/bin/Release"

          # Create a minimal consumer project.
          cat > "$tmpdir/Consumer.csproj" <<'CSPROJ'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Timslite" Version="*" />
            </ItemGroup>
          </Project>
          CSPROJ

          cat > "$tmpdir/Program.cs" <<'CS'
          using System;
          using Timslite;
          Console.WriteLine($"Timslite loaded OK, version: {TimsliteInfo.Version()}");
          CS

          dotnet restore "$tmpdir/Consumer.csproj" --source "$nupkg_dir"
          dotnet build "$tmpdir/Consumer.csproj" -c Release --no-restore
          dotnet run --project "$tmpdir/Consumer.csproj" -c Release --no-build

  publish:
    name: Publish to NuGet
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Timslite
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          runtimes_dir="wrapper/dotnet/src/Timslite/runtimes"
          rm -rf "$runtimes_dir"
          cp -R native-download/runtimes "$runtimes_dir"

      - name: Pack NuGet package
        run: dotnet pack wrapper/dotnet/src/Timslite/Timslite.csproj -c Release

      - name: Authenticate with NuGet
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          set -euo pipefail
          nupkg=$(find wrapper/dotnet/src/Timslite/bin/Release -name 'Timslite.*.nupkg' | head -1)
          if [[ -z "$nupkg" ]]; then
            echo "ERROR: .nupkg not found" >&2
            exit 1
          fi
          dotnet nuget push "$nupkg" --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
