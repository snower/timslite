name: Java Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build distributions without publishing"
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '8'
  RUST_TOOLCHAIN: 'stable'
  CARGO_INCREMENTAL: 0

jobs:
  build-native:
    name: Build native (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            artifact: native-macos-aarch64
            native-lib: libtimslite_java.dylib
          - os: ubuntu-latest
            label: linux-x86_64
            artifact: native-linux-x86_64
            native-lib: libtimslite_java.so
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            artifact: native-linux-aarch64
            native-lib: libtimslite_java.so
          - os: windows-latest
            label: windows-x86_64
            artifact: native-windows-x86_64
            native-lib: timslite_java.dll
          - os: windows-11-arm
            label: windows-aarch64
            artifact: native-windows-aarch64
            native-lib: timslite_java.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Build Rust cdylib (debug for tests)
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml

      - name: Run Maven tests
        run: mvn -f wrapper/java/pom.xml clean test

      - name: Build Rust cdylib (release for publication)
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml --release

      - name: Prepare native artifact
        run: |
          mkdir -p native-upload
          # Rename library with architecture suffix
          if [ "${{ matrix.label }}" = "macos-aarch64" ]; then
            cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/libtimslite_java-macos-aarch64.dylib
          elif [ "${{ matrix.label }}" = "linux-x86_64" ]; then
            cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/libtimslite_java-linux-x86_64.so
          elif [ "${{ matrix.label }}" = "linux-aarch64" ]; then
            cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/libtimslite_java-linux-aarch64.so
          elif [ "${{ matrix.label }}" = "windows-x86_64" ]; then
            cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/timslite_java-windows-x86_64.dll
          elif [ "${{ matrix.label }}" = "windows-aarch64" ]; then
            cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/timslite_java-windows-aarch64.dll
          fi

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-upload/

  publish:
    name: Publish to Maven Central
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Place native libraries for packaging
        run: |
          # Create directory for native libraries that will be included in JAR
          mkdir -p wrapper/java/target/native
          # Copy all platform native libraries with architecture-specific names
          cp native-download/libtimslite_java-macos-aarch64.dylib wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/libtimslite_java-linux-x86_64.so wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/libtimslite_java-linux-aarch64.so wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/timslite_java-windows-x86_64.dll wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/timslite_java-windows-aarch64.dll wrapper/java/target/native/ 2>/dev/null || true
          # List what we have
          ls -la wrapper/java/target/native/

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.SONATYPE_USERNAME}</username>
                <password>${env.SONATYPE_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to Maven Central
        run: |
          # Override native.lib.dir to point to our downloaded artifacts
          mvn -f wrapper/java/pom.xml clean deploy \
            -P release \
            -Dnative.lib.dir=wrapper/java/target/native \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload JAR artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          path: |
            wrapper/java/target/*.jar
            wrapper/java/target/*.pom

  dry-run:
    name: Build Dry-Run
    needs: build-native
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Place native libraries for packaging
        run: |
          mkdir -p wrapper/java/target/native
          cp native-download/libtimslite_java-macos-aarch64.dylib wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/libtimslite_java-linux-x86_64.so wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/libtimslite_java-linux-aarch64.so wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/timslite_java-windows-x86_64.dll wrapper/java/target/native/ 2>/dev/null || true
          cp native-download/timslite_java-windows-aarch64.dll wrapper/java/target/native/ 2>/dev/null || true
          ls -la wrapper/java/target/native/

      - name: Build JAR with all native libraries
        run: |
          mvn -f wrapper/java/pom.xml clean package \
            -Dnative.lib.dir=wrapper/java/target/native

      - name: Verify JAR contents
        run: |
          echo "=== JAR contents ==="
          jar tf wrapper/java/target/timslite-*.jar | grep -E "\.(dylib|so|dll)$" || echo "No native libraries found in JAR"
          echo ""
          echo "=== JAR size ==="
          ls -lh wrapper/java/target/timslite-*.jar

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          path: |
            wrapper/java/target/*.jar
