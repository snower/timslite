name: Java Release

on:
  workflow_run:
    workflows: ["Release Rust Crate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Keep true for validation only; set false to publish manually"
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '21'
  RUST_TOOLCHAIN: stable
  CARGO_INCREMENTAL: 0
  MAVEN_ARGS: --batch-mode --no-transfer-progress

jobs:
  build-native:
    name: Build native (${{ matrix.platform }})
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            artifact: native-macos-aarch64
            native-lib: libtimslite_java.dylib
            cargo-target: aarch64-apple-darwin
            rustflags: ""
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact: native-linux-x86_64
            native-lib: libtimslite_java.so
            cargo-target: x86_64-unknown-linux-gnu
            rustflags: ""
          - os: ubuntu-latest
            platform: linux-x86_64-musl
            artifact: native-linux-x86_64-musl
            native-lib: libtimslite_java.so
            cargo-target: x86_64-unknown-linux-musl
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            artifact: native-linux-aarch64
            native-lib: libtimslite_java.so
            cargo-target: aarch64-unknown-linux-gnu
            rustflags: ""
          - os: ubuntu-24.04-arm
            platform: linux-aarch64-musl
            artifact: native-linux-aarch64-musl
            native-lib: libtimslite_java.so
            cargo-target: aarch64-unknown-linux-musl
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN'
          - os: windows-latest
            platform: windows-x86_64
            artifact: native-windows-x86_64
            native-lib: timslite_java.dll
            cargo-target: x86_64-pc-windows-msvc
            rustflags: ""
          - os: windows-11-arm
            platform: windows-aarch64
            artifact: native-windows-aarch64
            native-lib: timslite_java.dll
            cargo-target: aarch64-pc-windows-msvc
            rustflags: ""
    runs-on: ${{ matrix.os }}
    env:
      CARGO_PROFILE_RELEASE_PANIC: abort
      CARGO_TARGET_DIR: wrapper/java/native/target
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo-target }}

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-${{ matrix.platform }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-cargo-java-
            ${{ runner.os }}-cargo-java-

      - name: Run Maven tests
        if: ${{ !endsWith(matrix.platform, '-musl') }}
        run: mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean test "-Dnative.platform=${{ matrix.platform }}"

      - name: Build Rust cdylib for publication
        if: ${{ !startsWith(matrix.platform, 'linux-') && !endsWith(matrix.platform, '-musl') }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml --release --target ${{ matrix.cargo-target }} --lib

      - name: Build Rust cdylib for publication (manylinux)
        if: ${{ startsWith(matrix.platform, 'linux-') && !endsWith(matrix.platform, '-musl') }}
        shell: bash
        env:
          GNU_TARGET: ${{ matrix.cargo-target }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -euo pipefail
          case "${GNU_TARGET}" in
            x86_64-unknown-linux-gnu)
              image="quay.io/pypa/manylinux_2_28_x86_64"
              ;;
            aarch64-unknown-linux-gnu)
              image="quay.io/pypa/manylinux_2_28_aarch64"
              ;;
            *)
              echo "Unsupported manylinux target: ${GNU_TARGET}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -e CARGO_PROFILE_RELEASE_PANIC=abort \
            -e CARGO_TARGET_DIR=/work/wrapper/java/native/target \
            -e GNU_TARGET \
            -e RUSTFLAGS \
            -v "${PWD}:/work" \
            -w /work \
            "${image}" \
            /bin/bash -lc '
            set -euo pipefail
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y curl
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl
            fi
            if ! command -v cargo >/dev/null 2>&1; then
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${HOME}/.cargo/env"
            fi
            if command -v rustup >/dev/null 2>&1; then
              rustup target add "${GNU_TARGET}"
            fi
            cargo build --manifest-path wrapper/java/native/Cargo.toml --release --target "${GNU_TARGET}" --lib
            '

      - name: Build Rust cdylib for publication (musl)
        if: ${{ endsWith(matrix.platform, '-musl') }}
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          MUSL_TARGET: ${{ matrix.cargo-target }}
        run: |
          set -euo pipefail
          case "${MUSL_TARGET}" in
            x86_64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_x86_64"
              ;;
            aarch64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_aarch64"
              ;;
            *)
              echo "Unsupported musl target: ${MUSL_TARGET}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -e CARGO_PROFILE_RELEASE_PANIC=abort \
            -e CARGO_TARGET_DIR=/work/wrapper/java/native/target \
            -e MUSL_TARGET \
            -e RUSTFLAGS \
            -v "${PWD}:/work" \
            -w /work \
            "${image}" \
            /bin/bash -lc '
            set -euo pipefail
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache curl
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y curl
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl
            fi
            if ! command -v cargo >/dev/null 2>&1; then
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${HOME}/.cargo/env"
            fi
            if command -v rustup >/dev/null 2>&1; then
              rustup target add "${MUSL_TARGET}"
            fi
            case "${MUSL_TARGET}" in
              x86_64-unknown-linux-musl)
                linker_env="CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="x86_64-linux-musl-gcc x86_64-unknown-linux-musl-gcc musl-gcc gcc"
                ;;
              aarch64-unknown-linux-musl)
                linker_env="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="aarch64-linux-musl-gcc aarch64-unknown-linux-musl-gcc gcc"
                ;;
            esac
            linker=""
            for candidate in ${candidates}; do
              if command -v "${candidate}" >/dev/null 2>&1; then
                linker="$(command -v "${candidate}")"
                break
              fi
            done
            if [ -z "${linker}" ]; then
              linker="$(find / -type f \( -name "${MUSL_TARGET}-gcc" -o -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${linker}" ] || [ ! -x "${linker}" ]; then
              echo "Could not find musl linker for ${MUSL_TARGET}" >&2
              find / -maxdepth 4 -type f \( -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) -print >&2 2>/dev/null || true
              exit 1
            fi
            export "${linker_env}=${linker}"
            cargo build --manifest-path wrapper/java/native/Cargo.toml --release --target "${MUSL_TARGET}" --lib
            libgcc_path="$("${linker}" -print-file-name=libgcc_s.so.1 || true)"
            if [ -z "${libgcc_path}" ] || [ "${libgcc_path}" = "libgcc_s.so.1" ] || [ ! -f "${libgcc_path}" ]; then
              libgcc_path="$(find / -type f -name libgcc_s.so.1 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${libgcc_path}" ] || [ ! -f "${libgcc_path}" ]; then
              echo "Could not find musl libgcc_s.so.1" >&2
              "${linker}" -print-search-dirs >&2 || true
              find / -maxdepth 5 -type f -name libgcc_s.so.1 -print >&2 2>/dev/null || true
              exit 1
            fi
            cp "${libgcc_path}" "wrapper/java/native/target/${MUSL_TARGET}/release/libgcc_s.so.1"
            '

      - name: Prepare native artifact
        shell: bash
        run: |
          set -euo pipefail
          release_dir="wrapper/java/native/target/${{ matrix.cargo-target }}/release"
          mkdir -p "native-upload/META-INF/native/${{ matrix.platform }}"
          if [ ! -d "${release_dir}" ]; then
            echo "Cargo release directory does not exist: ${release_dir}" >&2
            find wrapper/java/native/target -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi
          lib_path="$(find "${release_dir}" -maxdepth 2 -type f -name "${{ matrix.native-lib }}" | head -n 1)"
          if [ -z "${lib_path}" ]; then
            echo "Could not find ${{ matrix.native-lib }} under ${release_dir}" >&2
            find "${release_dir}" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          cp "${lib_path}" "native-upload/META-INF/native/${{ matrix.platform }}/${{ matrix.native-lib }}"
          if [ -f "${release_dir}/libgcc_s.so.1" ]; then
            cp "${release_dir}/libgcc_s.so.1" "native-upload/META-INF/native/${{ matrix.platform }}/libgcc_s.so.1"
          fi
          find native-upload -type f -print

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-upload/

  publish:
    name: Publish to Maven Central
    needs: build-native
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          native_dir="${RUNNER_TEMP}/timslite-native-libs"
          rm -rf "${native_dir}"
          mkdir -p "${native_dir}"
          cp -R native-download/META-INF/native/. "${native_dir}/"
          find "${native_dir}" -type f -print
          echo "TIMSLITE_NATIVE_LIB_DIR=${native_dir}" >> "${GITHUB_ENV}"

      - name: Publish to Maven Central
        run: >
          mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean deploy
          -P release
          "-Dnative.lib.dir=$TIMSLITE_NATIVE_LIB_DIR"
          "-Dnative.platform=linux-x86_64"
          "-Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}"
        env:
          CENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  dry-run:
    name: Build Dry-Run
    needs: build-native
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          native_dir="${RUNNER_TEMP}/timslite-native-libs"
          rm -rf "${native_dir}"
          mkdir -p "${native_dir}"
          cp -R native-download/META-INF/native/. "${native_dir}/"
          find "${native_dir}" -type f -print
          echo "TIMSLITE_NATIVE_LIB_DIR=${native_dir}" >> "${GITHUB_ENV}"

      - name: Build JAR with all native libraries
        run: >
          mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean package
          -P release
          "-Dnative.lib.dir=$TIMSLITE_NATIVE_LIB_DIR"
          "-Dnative.platform=linux-x86_64"

      - name: Verify JAR contents
        shell: bash
        run: |
          set -euo pipefail
          ls -lh wrapper/java/target/timslite-*.jar
          main_jar="$(find wrapper/java/target -maxdepth 1 -type f -name 'timslite-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n 1)"
          if [ -z "${main_jar}" ]; then
            echo "Could not find main timslite jar in wrapper/java/target" >&2
            find wrapper/java/target -maxdepth 1 -type f -name '*.jar' -print >&2
            exit 1
          fi
          echo "Verifying main jar: ${main_jar}"
          jar tf "${main_jar}" | tee jar-contents.txt
          for expected in \
            META-INF/native/macos-aarch64/libtimslite_java.dylib \
            META-INF/native/linux-x86_64/libtimslite_java.so \
            META-INF/native/linux-x86_64-musl/libtimslite_java.so \
            META-INF/native/linux-x86_64-musl/libgcc_s.so.1 \
            META-INF/native/linux-aarch64/libtimslite_java.so \
            META-INF/native/linux-aarch64-musl/libtimslite_java.so \
            META-INF/native/linux-aarch64-musl/libgcc_s.so.1 \
            META-INF/native/windows-x86_64/timslite_java.dll \
            META-INF/native/windows-aarch64/timslite_java.dll; do
            if ! grep -Fxq "${expected}" jar-contents.txt; then
              echo "Missing ${expected} in ${main_jar}" >&2
              exit 1
            fi
            echo "  OK: ${expected}"
          done

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          path: |
            wrapper/java/target/*.jar
            wrapper/java/target/*.pom
