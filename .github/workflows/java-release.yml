name: Java Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build distributions without publishing"
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '8'
  RUST_TOOLCHAIN: 'stable'
  CARGO_INCREMENTAL: 0

jobs:
  build-native:
    name: Build native (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            artifact: native-macos-aarch64
            native-lib: libtimslite_java.dylib
          - os: ubuntu-latest
            label: linux-x86_64
            artifact: native-linux-x86_64
            native-lib: libtimslite_java.so
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            artifact: native-linux-aarch64
            native-lib: libtimslite_java.so
          - os: windows-latest
            label: windows-x86_64
            artifact: native-windows-x86_64
            native-lib: timslite_java.dll
          - os: windows-11-arm
            label: windows-aarch64
            artifact: native-windows-aarch64
            native-lib: timslite_java.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Build Rust cdylib (debug for tests)
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml

      - name: Run Maven tests
        run: mvn -f wrapper/java/pom.xml clean test

      - name: Build Rust cdylib (release for publication)
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml --release

      - name: Prepare native artifact
        run: |
          mkdir -p native-upload
          cp wrapper/java/native/target/release/${{ matrix.native-lib }} native-upload/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-upload/

  publish:
    name: Publish to Maven Central
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Place native libraries for classifier jars
        run: |
          mkdir -p wrapper/java/native/target/release
          cp native-download/* wrapper/java/native/target/release/

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.SONATYPE_USERNAME}</username>
                <password>${env.SONATYPE_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to Maven Central
        run: |
          mvn -f wrapper/java/pom.xml clean deploy \
            -P release \
            -P macos-aarch64 \
            -P linux-x86_64 \
            -P linux-aarch64 \
            -P windows-x86_64 \
            -P windows-aarch64 \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload JAR artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: java-jars
          path: wrapper/java/target/*.jar
