name: Java Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build distributions without publishing"
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'
  RUST_TOOLCHAIN: stable
  CARGO_INCREMENTAL: 0
  MAVEN_ARGS: --batch-mode --no-transfer-progress

jobs:
  build-native:
    name: Build native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: macos-x86_64
            artifact: native-macos-x86_64
            native-lib: libtimslite_java.dylib
            cargo-target: x86_64-apple-darwin
          - os: macos-14
            platform: macos-aarch64
            artifact: native-macos-aarch64
            native-lib: libtimslite_java.dylib
            cargo-target: aarch64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact: native-linux-x86_64
            native-lib: libtimslite_java.so
            cargo-target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            platform: linux-x86_64-musl
            artifact: native-linux-x86_64-musl
            native-lib: libtimslite_java.so
            cargo-target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            artifact: native-linux-aarch64
            native-lib: libtimslite_java.so
            cargo-target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-aarch64-musl
            artifact: native-linux-aarch64-musl
            native-lib: libtimslite_java.so
            cargo-target: aarch64-unknown-linux-musl
          - os: windows-latest
            platform: windows-x86_64
            artifact: native-windows-x86_64
            native-lib: timslite_java.dll
            cargo-target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            platform: windows-aarch64
            artifact: native-windows-aarch64
            native-lib: timslite_java.dll
            cargo-target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo-target }}

      - name: Install Linux musl toolchain
        if: ${{ endsWith(matrix.platform, '-musl') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-${{ matrix.platform }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-cargo-java-
            ${{ runner.os }}-cargo-java-

      - name: Run Maven tests
        if: ${{ !endsWith(matrix.platform, '-musl') }}
        run: mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean test -Dnative.platform=${{ matrix.platform }}

      - name: Build Rust cdylib for publication
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml --release --target ${{ matrix.cargo-target }}

      - name: Prepare native artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "native-upload/META-INF/native/${{ matrix.platform }}"
          cp "wrapper/java/native/target/${{ matrix.cargo-target }}/release/${{ matrix.native-lib }}" \
             "native-upload/META-INF/native/${{ matrix.platform }}/${{ matrix.native-lib }}"
          find native-upload -type f -print

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-upload/

  publish:
    name: Publish to Maven Central
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          native_dir="${RUNNER_TEMP}/timslite-native-libs"
          rm -rf "${native_dir}"
          mkdir -p "${native_dir}"
          cp -R native-download/META-INF/native/. "${native_dir}/"
          find "${native_dir}" -type f -print
          echo "TIMSLITE_NATIVE_LIB_DIR=${native_dir}" >> "${GITHUB_ENV}"

      - name: Publish to Maven Central
        run: >
          mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean deploy
          -P release
          -Dnative.lib.dir="$TIMSLITE_NATIVE_LIB_DIR"
          -Dnative.platform=linux-x86_64
          -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"
        env:
          CENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  dry-run:
    name: Build Dry-Run
    needs: build-native
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-download
          merge-multiple: true

      - name: Stage native libraries
        shell: bash
        run: |
          set -euo pipefail
          native_dir="${RUNNER_TEMP}/timslite-native-libs"
          rm -rf "${native_dir}"
          mkdir -p "${native_dir}"
          cp -R native-download/META-INF/native/. "${native_dir}/"
          find "${native_dir}" -type f -print
          echo "TIMSLITE_NATIVE_LIB_DIR=${native_dir}" >> "${GITHUB_ENV}"

      - name: Build JAR with all native libraries
        run: >
          mvn ${{ env.MAVEN_ARGS }} -f wrapper/java/pom.xml clean package
          -P release
          -Dnative.lib.dir="$TIMSLITE_NATIVE_LIB_DIR"
          -Dnative.platform=linux-x86_64

      - name: Verify JAR contents
        shell: bash
        run: |
          set -euo pipefail
          jar tf wrapper/java/target/timslite-*.jar | grep -E '^META-INF/native/.+/(libtimslite_java\.dylib|libtimslite_java\.so|timslite_java\.dll)$'
          ls -lh wrapper/java/target/timslite-*.jar

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          path: |
            wrapper/java/target/*.jar
            wrapper/java/target/*.pom
