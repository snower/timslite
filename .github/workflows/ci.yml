name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib -- --test-threads=1

      - name: Run integration tests
        run: cargo test --tests -- --test-threads=1

      - name: Run benchmarks
        run: |
          cargo bench --bench bench_single
          cargo bench --bench bench_multi

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --no-fail-fast --lcov --output-path lcov.info -- --test-threads=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  python-tests:
    name: Python Wrapper Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py${{ matrix.python-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py${{ matrix.python-version }}-

      - name: Create virtualenv and install dependencies
        working-directory: wrapper/python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest

      - name: Build and install Python wrapper
        working-directory: wrapper/python
        run: .venv/bin/maturin develop --release

      - name: Run Python tests
        working-directory: wrapper/python
        run: .venv/bin/python -m pytest tests/ -v --tb=short

  nodejs-tests:
    name: Node.js Wrapper Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    strategy:
      matrix:
        node-version: ["22", "24", "26"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            wrapper/nodejs/target
          key: ${{ runner.os }}-cargo-node${{ matrix.node-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-node${{ matrix.node-version }}-

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Build native addon
        working-directory: wrapper/nodejs
        run: npm run build

      - name: Run tests
        working-directory: wrapper/nodejs
        run: npm test

  java-tests:
    name: Java Wrapper Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/java/native/target
          key: ${{ runner.os }}-cargo-java-${{ hashFiles('wrapper/java/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-

      - name: Build Rust cdylib
        run: cargo build --manifest-path wrapper/java/native/Cargo.toml

      - name: Run Maven tests
        run: mvn -f wrapper/java/pom.xml clean test

  dotnet-tests:
    name: .NET Wrapper Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wrapper/dotnet/native/target
          key: ${{ runner.os }}-cargo-dotnet-${{ hashFiles('wrapper/dotnet/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dotnet-

      - name: Build Rust cdylib
        run: cargo build --manifest-path wrapper/dotnet/native/Cargo.toml

      - name: Restore .NET dependencies
        run: dotnet restore wrapper/dotnet/Timslite.slnx

      - name: Build .NET solution
        run: dotnet build wrapper/dotnet/Timslite.slnx --no-restore

      - name: Stage native library for .NET tests
        shell: bash
        run: |
          set -euo pipefail
          output_dir="wrapper/dotnet/tests/Timslite.Tests/bin/Debug/net8.0"
          dest="$output_dir/runtimes/linux-x64/native"
          mkdir -p "$dest"
          cp wrapper/dotnet/native/target/debug/libtimslite_dotnet.so "$dest/libtimslite_dotnet.so"
          cp wrapper/dotnet/native/target/debug/libtimslite_dotnet.so "$output_dir/libtimslite_dotnet.so"
          find "$output_dir" -name 'libtimslite_dotnet.so' -print

      - name: Run .NET tests
        env:
          TIMSLITE_NATIVE_LIBRARY_PATH: ${{ github.workspace }}/wrapper/dotnet/native/target/debug/libtimslite_dotnet.so
        run: dotnet test wrapper/dotnet/Timslite.slnx --no-build --verbosity normal
