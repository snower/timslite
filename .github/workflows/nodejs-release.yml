name: Node.js Release

on:
  workflow_run:
    workflows: ["Release Rust Crate"]
    types: [completed]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: nodejs-release-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build - ${{ matrix.target }}
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release' }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Linux ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Linux musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Build native addon
        working-directory: wrapper/nodejs
        run: npm exec -- napi build --platform --no-js --release --target ${{ matrix.target }} --dts auto-generated.d.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: wrapper/nodejs/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/timslite
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wrapper/nodejs/artifacts
          merge-multiple: true

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Move artifacts to root package
        working-directory: wrapper/nodejs
        run: |
          mv artifacts/*.node .

      - name: Resolve npm dist tag
        id: npm_tag
        working-directory: wrapper/nodejs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          release_tag="v${version}"
          if ! is_prerelease="$(gh release view "${release_tag}" --json isPrerelease --jq '.isPrerelease' 2>/dev/null)"; then
            release_tag="${version}"
            is_prerelease="$(gh release view "${release_tag}" --json isPrerelease --jq '.isPrerelease')"
          fi
          if [ "${is_prerelease}" = "true" ]; then
            echo "tag=next" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare source build fallback
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          node scripts/prepare-publish.js
          for attempt in {1..60}; do
            if cargo generate-lockfile --manifest-path Cargo.toml; then
              cargo fetch --locked --manifest-path Cargo.toml
              exit 0
            fi
            echo "timslite crate version is not available on crates.io yet; retrying in 10 seconds ($attempt/60)"
            sleep 10
          done
          echo "Timed out waiting for timslite crate to become available on crates.io" >&2
          exit 1

      - name: Verify package contents
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          expected="$(node -p "require('./package.json').napi.targets.length")"
          actual="$(find . -maxdepth 1 -name '*.node' | wc -l | tr -d ' ')"
          test "$actual" = "$expected"
          npm pack --dry-run --json > pack.json
          node -e "const fs = require('fs'); const pkg = require('./package.json'); const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0]; const paths = new Set(pack.files.map((f) => f.path)); const nodes = pack.files.filter((f) => f.path.endsWith('.node')); if (nodes.length !== pkg.napi.targets.length) { throw new Error(`npm pack would include ${nodes.length} native artifacts, expected ${pkg.napi.targets.length}`); } for (const required of ['README.md', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'binding-target.js', 'scripts/install.js', 'scripts/prepare-publish.js', 'src/lib.rs']) { if (!paths.has(required)) { throw new Error(`npm pack is missing ${required}`); } }"

      - name: Publish root package
        working-directory: wrapper/nodejs
        env:
          NPM_CONFIG_TAG: ${{ steps.npm_tag.outputs.tag }}
        run: npm publish
