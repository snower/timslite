name: Node.js Release

on:
  workflow_run:
    workflows: ["Release Rust Crate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate package without publishing"
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: nodejs-release-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build - ${{ matrix.target }}
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_PROFILE_RELEASE_PANIC: abort
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            rustflags: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            rustflags: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            rustflags: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN/libs/x86_64-unknown-linux-musl'
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            rustflags: '-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN/libs/aarch64-unknown-linux-musl'
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rustflags: ""
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            rustflags: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Linux ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install dependencies
        if: ${{ !contains(matrix.target, 'musl') }}
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Build native addon
        if: ${{ !contains(matrix.target, 'musl') }}
        working-directory: wrapper/nodejs
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: npm exec -- napi build --platform --no-js --release --target ${{ matrix.target }} --dts auto-generated.d.ts

      - name: Build native addon (musl)
        if: ${{ contains(matrix.target, 'musl') }}
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          MUSL_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "${MUSL_TARGET}" in
            x86_64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_x86_64"
              ;;
            aarch64-unknown-linux-musl)
              image="quay.io/pypa/musllinux_1_2_aarch64"
              ;;
            *)
              echo "Unsupported musl target: ${MUSL_TARGET}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -e CARGO_PROFILE_RELEASE_PANIC=abort \
            -e MUSL_TARGET \
            -e RUSTFLAGS \
            -v "${PWD}:/work" \
            -w /work \
            "${image}" \
            /bin/bash -lc '
            set -euo pipefail
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache curl nodejs npm
            else
              if command -v dnf >/dev/null 2>&1; then
                dnf install -y nodejs npm curl
              elif command -v yum >/dev/null 2>&1; then
                yum install -y nodejs npm curl
              else
                echo "Could not find a package manager to install nodejs/npm" >&2
                exit 1
              fi
            fi
            if ! command -v cargo >/dev/null 2>&1; then
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${HOME}/.cargo/env"
            fi
            if command -v rustup >/dev/null 2>&1; then
              rustup target add "${MUSL_TARGET}"
            fi
            case "${MUSL_TARGET}" in
              x86_64-unknown-linux-musl)
                linker_env="CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="x86_64-linux-musl-gcc x86_64-unknown-linux-musl-gcc musl-gcc gcc"
                ;;
              aarch64-unknown-linux-musl)
                linker_env="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER"
                candidates="aarch64-linux-musl-gcc aarch64-unknown-linux-musl-gcc gcc"
                ;;
            esac
            linker=""
            for candidate in ${candidates}; do
              if command -v "${candidate}" >/dev/null 2>&1; then
                linker="$(command -v "${candidate}")"
                break
              fi
            done
            if [ -z "${linker}" ]; then
              linker="$(find / -type f \( -name "${MUSL_TARGET}-gcc" -o -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${linker}" ] || [ ! -x "${linker}" ]; then
              echo "Could not find musl linker for ${MUSL_TARGET}" >&2
              find / -maxdepth 4 -type f \( -name "*linux-musl-gcc" -o -name "musl-gcc" -o -name "gcc" \) -print >&2 2>/dev/null || true
              exit 1
            fi
            export "${linker_env}=${linker}"
            cd wrapper/nodejs
            npm ci
            npm exec -- napi build --platform --no-js --release --target "${MUSL_TARGET}" --dts auto-generated.d.ts
            libgcc_path="$("${linker}" -print-file-name=libgcc_s.so.1 || true)"
            if [ -z "${libgcc_path}" ] || [ "${libgcc_path}" = "libgcc_s.so.1" ] || [ ! -f "${libgcc_path}" ]; then
              libgcc_path="$(find / -type f -name libgcc_s.so.1 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${libgcc_path}" ] || [ ! -f "${libgcc_path}" ]; then
              echo "Could not find musl libgcc_s.so.1" >&2
              "${linker}" -print-search-dirs >&2 || true
              find / -maxdepth 5 -type f -name libgcc_s.so.1 -print >&2 2>/dev/null || true
              exit 1
            fi
            mkdir -p "libs/${MUSL_TARGET}"
            cp "${libgcc_path}" "libs/${MUSL_TARGET}/libgcc_s.so.1"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            wrapper/nodejs/*.node
            wrapper/nodejs/libs/${{ matrix.target }}/libgcc_s.so.1
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/timslite
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wrapper/nodejs/artifacts
          merge-multiple: true

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Move artifacts to root package
        working-directory: wrapper/nodejs
        run: |
          mv artifacts/*.node .
          if [ -d artifacts/libs ]; then
            cp -R artifacts/libs .
          fi

      - name: Resolve npm dist tag
        id: npm_tag
        working-directory: wrapper/nodejs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          release_tag="v${version}"
          if ! is_prerelease="$(gh release view "${release_tag}" --json isPrerelease --jq '.isPrerelease' 2>/dev/null)"; then
            release_tag="${version}"
            is_prerelease="$(gh release view "${release_tag}" --json isPrerelease --jq '.isPrerelease')"
          fi
          if [ "${is_prerelease}" = "true" ]; then
            echo "tag=next" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare source build fallback
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          node scripts/prepare-publish.js
          for attempt in {1..60}; do
            if cargo generate-lockfile --manifest-path Cargo.toml; then
              cargo fetch --locked --manifest-path Cargo.toml
              exit 0
            fi
            echo "timslite crate version is not available on crates.io yet; retrying in 10 seconds ($attempt/60)"
            sleep 10
          done
          echo "Timed out waiting for timslite crate to become available on crates.io" >&2
          exit 1

      - name: Verify package contents
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          expected="$(node -p "require('./package.json').napi.targets.length")"
          actual="$(find . -maxdepth 1 -name '*.node' | wc -l | tr -d ' ')"
          test "$actual" = "$expected"
          npm pack --dry-run --json > pack.json
          node <<'NODE'
          const fs = require('fs');
          const pkg = require('./package.json');
          const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0];
          const paths = new Set(pack.files.map((f) => f.path));
          const nodes = pack.files.filter((f) => f.path.endsWith('.node'));
          if (nodes.length !== pkg.napi.targets.length) {
            throw new Error(`npm pack would include ${nodes.length} native artifacts, expected ${pkg.napi.targets.length}`);
          }
          for (const required of [
            'README.md',
            'Cargo.toml',
            'Cargo.lock',
            'build.rs',
            'binding-target.js',
            'scripts/install.js',
            'scripts/prepare-publish.js',
            'src/lib.rs',
            'libs/x86_64-unknown-linux-musl/libgcc_s.so.1',
            'libs/aarch64-unknown-linux-musl/libgcc_s.so.1',
          ]) {
            if (!paths.has(required)) {
              throw new Error(`npm pack is missing ${required}`);
            }
          }
          NODE

      - name: Publish root package
        working-directory: wrapper/nodejs
        env:
          NPM_CONFIG_TAG: ${{ steps.npm_tag.outputs.tag }}
        run: npm publish

  dry-run:
    name: Build Dry-Run
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wrapper/nodejs/artifacts
          merge-multiple: true

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Move artifacts to root package
        working-directory: wrapper/nodejs
        run: |
          mv artifacts/*.node .
          if [ -d artifacts/libs ]; then
            cp -R artifacts/libs .
          fi

      - name: Verify package contents
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          expected="$(node -p "require('./package.json').napi.targets.length")"
          actual="$(find . -maxdepth 1 -name '*.node' | wc -l | tr -d ' ')"
          test "$actual" = "$expected"
          npm pack --dry-run --json > pack.json
          node <<'NODE'
          const fs = require('fs');
          const pkg = require('./package.json');
          const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0];
          const paths = new Set(pack.files.map((f) => f.path));
          const nodes = pack.files.filter((f) => f.path.endsWith('.node'));
          if (nodes.length !== pkg.napi.targets.length) {
            throw new Error(`npm pack would include ${nodes.length} native artifacts, expected ${pkg.napi.targets.length}`);
          }
          for (const required of [
            'README.md',
            'Cargo.toml',
            'Cargo.lock',
            'build.rs',
            'binding-target.js',
            'scripts/install.js',
            'scripts/prepare-publish.js',
            'src/lib.rs',
            'libs/x86_64-unknown-linux-musl/libgcc_s.so.1',
            'libs/aarch64-unknown-linux-musl/libgcc_s.so.1',
          ]) {
            if (!paths.has(required)) {
              throw new Error(`npm pack is missing ${required}`);
            }
          }
          NODE
