name: Node.js Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: nodejs-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Linux ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Build native addon
        working-directory: wrapper/nodejs
        run: npm exec -- napi build --platform --release --target ${{ matrix.target }} --dts auto-generated.d.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: wrapper/nodejs/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_CONFIG_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wrapper/nodejs/artifacts
          merge-multiple: true

      - name: Install dependencies
        working-directory: wrapper/nodejs
        run: npm ci

      - name: Prepare npm platform packages
        working-directory: wrapper/nodejs
        run: |
          npm exec -- napi create-npm-dirs
          npm exec -- napi artifacts --output-dir artifacts

      - name: Verify package contents
        working-directory: wrapper/nodejs
        shell: bash
        run: |
          expected="$(node -p "require('./package.json').napi.targets.length")"
          actual="$(find npm -mindepth 2 -maxdepth 2 -name '*.node' | wc -l | tr -d ' ')"
          test "$actual" = "$expected"
          npm pack --dry-run --json > pack.json
          node -e "const fs = require('fs'); const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0]; if (!pack.files.some((f) => f.path.endsWith('.node'))) { throw new Error('npm pack would not include native .node artifacts'); }"

      - name: Publish platform packages
        working-directory: wrapper/nodejs
        run: npm exec -- napi pre-publish --no-gh-release

      - name: Publish root package
        working-directory: wrapper/nodejs
        run: npm publish
